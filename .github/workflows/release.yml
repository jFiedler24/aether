name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: macos
            ext: dmg
          - platform: windows-latest
            target: windows
            ext: nsis

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS bundler tools
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos-latest'
        run: npx tauri build

      - name: Build Tauri app (Windows NSIS only)
        if: matrix.platform == 'windows-latest'
        run: npx tauri build --bundles nsis

      - name: Package macOS artifact
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release
          find target/release/bundle -type f
          cp target/release/bundle/dmg/*.dmg release/ 2>/dev/null || true
          cp -R target/release/bundle/macos/*.app release/ 2>/dev/null || true

      - name: Package Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Get-ChildItem -Recurse target/release/bundle/
          # Portable executable (no installer)
          Copy-Item target/release/aether.exe release/Aether_${{ github.ref_name }}_x64-portable.exe
          if (Test-Path target/release/bundle/nsis/*.exe) {
            Copy-Item target/release/bundle/nsis/*.exe release/
          }

      - name: Prepare Windows signing certificate
        if: matrix.platform == 'windows-latest' && secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}"))
          "WINDOWS_SIGNING_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Windows artifacts
        if: matrix.platform == 'windows-latest' && env.WINDOWS_SIGNING_CERT_PATH != ''
        shell: pwsh
        run: |
          $files = Get-ChildItem release -Recurse -File | Where-Object { $_.Extension -in '.exe', '.msi' }
          if ($files.Count -eq 0) {
            Write-Host "No Windows artifacts found to sign."
            exit 0
          }

          foreach ($file in $files) {
            Write-Host "Signing $($file.FullName)"
            & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:WINDOWS_SIGNING_CERT_PATH" /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" "$($file.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "signtool failed for $($file.FullName)"
            }
            & signtool verify /pa "$($file.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "signature verification failed for $($file.FullName)"
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-${{ matrix.target }}
          path: release/*

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: aether-macos
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: aether-windows
          path: release/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
