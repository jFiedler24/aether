name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: macos
            ext: dmg
          - platform: windows-latest
            target: windows
            ext: msi

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS bundler tools
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Package macOS artifact
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p release
          find src-tauri/target/release/bundle -type f
          cp src-tauri/target/release/bundle/dmg/*.dmg release/ 2>/dev/null || true
          cp -R src-tauri/target/release/bundle/macos/*.app release/ 2>/dev/null || true

      - name: Package Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Get-ChildItem -Recurse src-tauri/target/release/bundle/
          if (Test-Path src-tauri/target/release/bundle/msi/*.msi) {
            Copy-Item src-tauri/target/release/bundle/msi/*.msi release/
          }
          if (Test-Path src-tauri/target/release/bundle/nsis/*.exe) {
            Copy-Item src-tauri/target/release/bundle/nsis/*.exe release/
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-${{ matrix.target }}
          path: release/*

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: aether-macos
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: aether-windows
          path: release/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
